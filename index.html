<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_X_0852</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        .input-container {
            display: flex;
            align-items: center;
        }
        .prompt {
            color: #00FF00;
            margin-right: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        #command-input {
            background: transparent;
            border: none;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        a {
            color: #00FFFF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="output"></div>

<div class="input-container">
    <span class="prompt">X_0852@SYSTEM:~#</span>
    <input type="text" id="command-input" autofocus autocomplete="off">
</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890';
    const alphabet = katakana.split('');

    const fontSize = 16;
    let columns = canvas.width / fontSize;

    const rainDrops = [];
    function initRain() {
        columns = canvas.width / fontSize;
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }
    }
    initRain();
    window.addEventListener('resize', initRain);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(0, 255, 0, 0.15)';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < rainDrops.length; i++) {
            const text = alphabet[Math.floor(Math.random() * alphabet.length)];
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                rainDrops[i] = 0;
            }
            rainDrops[i]++;
        }
    }
    setInterval(drawMatrix, 30);

    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('command-input');

    const welcomeText = `==================================================
TERMINAL CORE CORE_X_0852 INITIALIZED...
SYSTEM: ONLINE
STATUS: SECURE
--------------------------------------------------
ENTER ACCESS CODE TO DECRYPT CLASSIFIED FILES.
==================================================\n`;

    function typeWriter(text, index = 0) {
        if (index < text.length) {
            outputDiv.textContent += text.charAt(index);
            outputDiv.scrollTop = outputDiv.scrollHeight;
            setTimeout(() => typeWriter(text, index + 1), 5);
        }
    }
    typeWriter(welcomeText);

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const command = inputField.value.trim();
            outputDiv.textContent += `\nX_0852@SYSTEM:~# ${command}\n`;
            
            if (command === '0852') {
                outputDiv.textContent += `>> ACCESS GRANTED. DECRYPTING BACKROOMS ARCHIVES...\n`;
                outputDiv.textContent += `>> LOADING DIRECT_LINK.EXE...\n`;
                
                // აქ შენი Adsterra-ს ლინკი იხსნება ჩვეულებრივად
                const linkContainer = document.createElement('div');
                linkContainer.innerHTML = `>> <a href="https://speedyplanncr.github.io/Spbackroomsnc/" target="_blank">CLICK HERE TO ACCESS THE SECURE DATABASE</a>\n`;
                outputDiv.appendChild(linkContainer);
            } else if (command.toLowerCase() === 'clear') {
                outputDiv.textContent = '';
            } else if (command === '') {
                // ცარიელზე არაფერს შვრება
            } else {
                outputDiv.textContent += `>> ERROR: ACCESS DENIED. INVALID DECRYPTION CODE.\n`;
            }

            inputField.value = '';
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    });

    document.addEventListener('click', () => inputField.focus());
</script>

</body>
</html>
