<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_X_0852</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            overflow-x: hidden;
        }

        #terminal {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #00ff33;
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.2);
            padding: 20px;
            min-height: 500px;
            border-radius: 5px;
        }

        .output-line {
            margin-bottom: 8px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .system-msg { color: #00ff33; }
        .error-msg { color: #ff3333; }
        .success-msg { color: #00ffff; font-weight: bold; }
        .trigger-title { color: #ffff00; font-weight: bold; }
        .trigger-desc { color: #00ff33; }
        .muted-text { color: #888888; }

        .input-area {
            display: flex;
            margin-top: 15px;
        }

        .prompt {
            color: #00ff33;
            margin-right: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        a {
            color: #ffff00;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div id="history">
        <div class="output-line system-msg">==================================================</div>
        <div class="output-line system-msg">TERMINAL CORE v2.4 - BACKROOMS CLASSIFIED DATABASE</div>
        <div class="output-line system-msg">==================================================</div>
        <div class="output-line muted-text">Enter access code to decrypt hidden archives...</div>
        <div class="output-line muted-text">(Hint: Try '0852' for database or 'gd22' for dev files)</div>
    </div>
    
    <div class="input-area">
        <span class="prompt">root@backrooms:~#</span>
        <input type="text" id="texInput" autofocus autocomplete="off" placeholder="Enter code...">
    </div>
</div>

<script>
    const texInput = document.getElementById('texInput');
    const history = document.getElementById('history');

    // ტექსტის გამოტანის ფუნქცია
    function printLine(text, className = 'system-msg') {
        const line = document.createElement('div');
        line.className = `output-line ${className}`;
        line.innerHTML = text;
        history.appendChild(line);
        // ავტომატური სქროლი დაბლა
        document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
    }

    texInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const code = texInput.value.trim().toLowerCase();
            printLine(`<span style="color: #888;">> ${texInput.value}</span>`);
            texInput.value = '';

            if (code === '0852') {
                printLine(">> ACCESS GRANTED: DECRYPTING BACKROOMS FILES...", "success-msg");
                printLine("--------------------------------------------------", "muted-text");
                printLine("[FILE_01]: Level 0 Logs - 'The Lobby' structural anomaly discovered.");
                printLine("[FILE_02]: Warning - Entity contact reported in sector 4.");
                printLine("[LINK]: <a href='https://speedyplanncr.github.io/Spbackroomsnc/' target='_blank'>CLICK HERE TO OPEN DIRECT ARCHIVE LINK</a>", "success-msg");
                printLine("--------------------------------------------------", "muted-text");
            
            // აი აქ არის ახალი ჩამატებული GD 2.2 ტრიგერების ნაწილი
            } else if (code === 'gd22') {
                printLine(">> ACCESS GRANTED: GEOMETRY DASH 2.2 TRIGGER GUIDE <<", "success-msg");
                printLine("--------------------------------------------------", "muted-text");
                printLine("<span class='trigger-title'>[CAMERA TRIGGERS]</span> - Control zoom, rotation, and free-movement dynamically.", "trigger-desc");
                printLine("<span class='trigger-title'>[AREA TRIGGERS]</span>   - Target specific zones. Applies Move, Fade, or Scale to objects inside.", "trigger-desc");
                printLine("<span class='trigger-title'>[SONG TRIGGER]</span>    - Changes background music or adjusts track speed/pitch mid-level.", "trigger-desc");
                printLine("<span class='trigger-title'>[SFX TRIGGER]</span>     - Plays custom sound effects with spatial audio and volume controls.", "trigger-desc");
                printLine("<span class='trigger-title'>[GRADIENT TRIGGER]</span>- Creates smooth, cinematic color transitions across the screen.", "trigger-desc");
                printLine("--------------------------------------------------", "muted-text");
                printLine("System stable. Ready for next input.");
            
            } else if (code === 'clear') {
                history.innerHTML = '';
            } else if (code === '') {
                // არაფერს აკეთებს თუ ცარიელია
            } else {
                printLine(`ERROR: Access denied for code '${code}'. Invalid credentials.`, "error-msg");
            }
        }
    });
</script>

</body>
</html>
