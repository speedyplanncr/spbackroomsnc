<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNC - CORE SYSTEM</title>
    <style>
        body {
            background-color: #050505;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CRT Scanlines and flicker effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            width: 100%;
            max-width: 600px;
            background: #000000;
            border: 2px solid #ff3333;
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
            position: relative;
            z-index: 1;
        }

        .system-logs {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 25px;
            border-bottom: 1px dashed #ff3333;
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input[type="text"] {
            background: #111;
            border: 1px solid #ff3333;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            font-size: 16px;
            outline: none;
            text-align: center;
            text-transform: uppercase;
            box-shadow: inset 0 0 5px rgba(255, 51, 51, 0.1);
        }

        .exec-btn {
            background: #ff3333;
            color: #000;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .exec-btn:hover {
            background: #cc0000;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .output-message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 40px;
            line-height: 1.4;
            white-space: pre-line;
        }

        /* Initial Screen overlay */
        #audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .init-btn {
            background: transparent;
            color: #ff3333;
            border: 2px dashed #ff3333;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="audio-overlay">
        <button class="init-btn" onclick="startTerminal()">> INITIALIZE CORE SYSTEM <</button>
    </div>

    <audio id="bg-sound" loop>
        <source src="https://archive.org/download/backrooms-ambience/backrooms-ambience.mp3" type="audio/mpeg">
    </audio>

    <div class="terminal">
        <div class="system-logs">
            > ASYNC CORE TERMINAL v1.95<br>
            > LOCATION: SECTOR 4 - MAINFRM<br>
            > CURRENT STATUS: SYSTEM BREACH DETECTED<br>
            > RADIATION CONTAMINATION LEVEL: 89%<br>
            > WARNING: ENTER ACCESS CODE OR OVERRIDE...
        </div>

        <div class="input-area">
            <label for="code-input">ENTER ACCESS COMMAND:</label>
            <input type="text" id="code-input" placeholder="----" maxlength="20" autocomplete="off">
            <button class="exec-btn" onclick="checkCode()">Execute Command</button>
        </div>

        <div class="output-message" id="output"></div>
    </div>

    <script>
        function startTerminal() {
            var audio = document.getElementById("bg-sound");
            audio.volume = 0.4;
            audio.play().catch(function(error) {
                console.log("Audio blocked: ", error);
            });
            document.getElementById("audio-overlay").style.display = "none";
        }

        function checkCode() {
            const input = document.getElementById('code-input').value.trim().toUpperCase();
            const output = document.getElementById('output');
            
            if (input === "") {
                output.innerHTML = "[ERROR]: NO COMMAND DETECTED.";
                output.style.color = "#ff3333";
                return;
            }

            if (input === "0852") {
                output.innerHTML = ">> ACCESS GRANTED <<\n[SUCCESS]: DOWNLOADING CLASSIFIED DATA...\nFILE CORRUPTED: 'SECTOR_5_MAP.DAT' ACCESS DENIED.";
                output.style.color = "#33ff33"; 
            } 
            else if (input === "OVERRIDE") {
                output.innerHTML = ">> SYSTEM OVERRIDE INITIATED <<\n[WARNING]: FORCING BACKUPS...\nPARTIAL ACCESS GRANTED TO SECTOR 5.\nNEW SECURE PASSWORD REQUIRED: [ _ _ _ _ ]\nHINT: 'CHECK THE CAMERAS IN THE NEXT VIDEO'";
                output.style.color = "#ffff33"; 
            } 
            else {
                output.innerHTML = "[INVALID COMMAND]: ATTEMPT BLOCKED.\nASYNC SECURITY HAS BEEN NOTIFIED.";
                output.style.color = "#ff3333"; 
            }
            
            document.getElementById('code-input').value = "";
        }
    </script>
</body>
</html>
